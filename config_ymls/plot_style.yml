# Central plotting style shared by every image-generating script.

FONT_FAMILY: DejaVu Sans
FONT_COLOR: "#1F2937"

TICK_FONT_SIZE: 26
LABEL_FONT_SIZE: 26
LEGEND_FONT_SIZE: 26
ANNOTATION_FONT_SIZE: 26

THEME_COLORWAY:
  - "#355C7D"
  - "#6C8EAD"
  - "#C06C84"
  - "#F67280"
  - "#F8B195"
  - "#7FB3B3"

GRID_COLOR: "#D9E1EA"
AXIS_LINE_COLOR: "#6B7280"
BG_COLOR: "#FFFFFF"

LEGEND_BG_COLOR: "rgba(255,255,255,0.92)"
LEGEND_BORDER_COLOR: "#CBD5E1"
LEGEND_BORDER_WIDTH: 1
LEGEND_ORIENTATION: v
LEGEND_X: 0.985
LEGEND_Y: 0.02
LEGEND_XANCHOR: right
LEGEND_YANCHOR: bottom

DEFAULT_LINE_WIDTH: 2.4
REFERENCE_LINE_WIDTH: 1.2
DEFAULT_MARKER_SIZE: 8

EXPORT_WIDTH: 1600
EXPORT_HEIGHT: 900
EXPORT_SCALE: 3
MATPLOTLIB_DPI: 240
