# metaorder_start_event_study.py configuration

# Plot styling is centralized in config_ymls/plot_style.yml.

# Dataset label
DATASET_NAME: ftsemib

# Paths
# You may use placeholders: {DATASET_NAME}.
OUTPUT_FILE_PATH: out_files/{DATASET_NAME}
IMG_OUTPUT_PATH: images/{DATASET_NAME}

# Inputs (override if needed)
PROP_PATH: null
CLIENT_PATH: null

# Output subfolder
ANALYSIS_TAG: metaorder_start_event_study

# Session used for exposure correction
TRADING_HOURS: ["09:30:00", "17:30:00"]

# Event-study design
EVENT_WINDOW_MINUTES: 20
BIN_MINUTES: 5
MATCHING_BUCKET_MINUTES: 20
HIGH_ETA_QUANTILE: 0.5
HIGH_ETA_QUANTILES: null  # optional threshold sweep, e.g. [0.5, 0.6, 0.7, 0.8, 0.9]

# Inference
ALPHA: 0.05
BOOTSTRAP_RUNS: 1000
PERMUTATION_RUNS: 1000
SEED: 0

# Performance
N_JOBS: 0  # 0 -> auto (currently capped conservatively inside the script)

# Robustness
RUN_SAME_ACTOR_ROBUSTNESS: true
SAME_ACTOR_KEY: auto  # auto -> Member if present, else Client if present

# Outputs
PLOTS: true
WRITE_PARQUET: false
SHOW_PROGRESS: true
