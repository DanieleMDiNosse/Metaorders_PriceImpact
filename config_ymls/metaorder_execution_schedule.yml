# metaorder_execution_schedule.py configuration

# Plotting
TICK_FONT_SIZE: 16
LABEL_FONT_SIZE: 18
TITLE_FONT_SIZE: 19
LEGEND_FONT_SIZE: 16

# Dataset and paths
DATASET_NAME: ftsemib
LEVEL: member
MEMBER_NATIONALITY: null  # null/all -> no filter; "it" or "foreign" to match metaorder_computation

# You may use placeholders: {DATASET_NAME}, {LEVEL}, {MEMBER_NATIONALITY_TAG}.
OUTPUT_FILE_PATH: out_files/{DATASET_NAME}
IMG_OUTPUT_PATH: images/{DATASET_NAME}

# Inputs (null -> canonical fit-filtered proprietary/client tables)
PROPRIETARY_PATH: null
CLIENT_PATH: null

# Execution
RUN_EXECUTION_SCHEDULE: true
N_TIME_GRID: 200
N_HEATMAP_BINS_Y: 150
