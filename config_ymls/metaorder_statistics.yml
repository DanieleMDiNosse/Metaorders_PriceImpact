# metaorder_statistics.py configuration (metaorder dictionary statistics)

# Plotting
TICK_FONT_SIZE: 14
LABEL_FONT_SIZE: 16
TITLE_FONT_SIZE: 17
LEGEND_FONT_SIZE: 14
DEFAULT_FIGSIZE: [11, 7.5]

# Dataset label
DATASET_NAME: ftsemib  # e.g., "ftsemib" or "mot"

# Paths
# You may use placeholders: {DATASET_NAME}, {METAORDER_STATS_LEVEL},
# {METAORDER_STATS_PROPRIETARY_TAG}, {MEMBER_NATIONALITY_TAG}.
PARQUET_PATH: data/parquet
OUTPUT_FILE_PATH: out_files/{DATASET_NAME}
IMG_OUTPUT_PATH: images/{DATASET_NAME}  # script appends /{METAORDER_STATS_LEVEL}_{METAORDER_STATS_PROPRIETARY_TAG}

# Trade-tape filtering
TRADING_HOURS: ["09:30:00", "17:30:00"]
MEMBER_NATIONALITY: null  # null/all -> no filter; "it" or "foreign" to match metaorder_computation

# Metaorder dictionary stats (from metaorders_dict_all_*.pkl)
RUN_METAORDER_DICT_STATS: true
METAORDER_STATS_LEVEL: member
METAORDER_STATS_PROPRIETARY: true
METAORDER_STATS_DICT_PATH: null  # null -> {OUTPUT_FILE_PATH}/metaorders_dict_all_{level}_{proprietary_tag}[ _member_nationality_{it|foreign} ].pkl

# Power-law tail fits for metaorder volumes
METAORDER_POWERLAW_FIT_ENABLED: false  # set false to disable power-law fitting overlays on distribution plots
METAORDER_POWERLAW_MIN_TAIL: 50  # minimum number of points required in the fitted tail x >= xmin
METAORDER_POWERLAW_NUM_CANDIDATES: 1000  # coarse log-spaced tail-size candidates
METAORDER_POWERLAW_REFINE_WINDOW: 50  # local +/- index window around best coarse candidate
