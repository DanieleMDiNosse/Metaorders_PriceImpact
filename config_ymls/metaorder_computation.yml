# metaorder_computation.py configuration

# Plotting
TICK_FONT_SIZE: 16
LABEL_FONT_SIZE: 18
TITLE_FONT_SIZE: 19
LEGEND_FONT_SIZE: 16
DEFAULT_FIGSIZE: [11, 7.5]

# Side decomposition
# If true, decompose (some) outputs into buy vs sell metaorders (Direction=+1/-1).
SPLIT_BY_SIDE: false

# Dataset / preprocessing
LEVEL: member  # "member" or "client"
PROPRIETARY: false
RECOMPUTE: true
TRADING_HOURS: ["09:30:00", "17:30:00"]
MEMBER_NATIONALITY: foreign  # null|all for no filter, or "it" / "foreign"

# Dataset label (used only for logging / filename tags unless you use it in templates below)
DATASET_NAME: ftsemib  # e.g., "ftsemib" or "mot"

# Paths
# You may use placeholders: {DATASET_NAME}, {LEVEL}, {PROPRIETARY_TAG}, {MEMBER_NATIONALITY_TAG}.
CSV_LOAD_PATH: data/csv
PARQUET_PATH: data/parquet
OUTPUT_FILE_PATH: out_files/{DATASET_NAME}
IMG_OUTPUT_PATH: images/{DATASET_NAME}  # script appends /{LEVEL}_{PROPRIETARY_TAG} and saves under png/ and html/

Q_V_DENOMINATOR_MODE: avg_5d  # same_day | prev_day | avg_5d
DAILY_VOL_MODE: avg_5d        # same_day | prev_day | avg_5d

# Section toggles
RUN_INTRO: true
RUN_METAORDER_COMPUTATION: true
RUN_SIGNATURE_PLOTS: false
RUN_SQL_FITS: true
RUN_WLS: true
RUN_IMPACT_PATH_PLOT: true

# Metaorder construction / fits
IMPACT_HORIZONS_MIN: [1, 3, 10, 30, 60]
SECONDS_FILTER: 120
MIN_QV: 1.0e-5
COMPUTE_IMPACT_PATHS: true
AFTERMATH_DURATION_MULTIPLIER: 2.0
AFTERMATH_NUM_SAMPLES: 30
MAX_GAP: 1h
MIN_TRADES: 5
RESAMPLE_FREQ: 1000s
N_LOGBIN: 30
MIN_COUNT: 20
MIN_COUNT_SURFACE: 10
MAX_PARTICIPATION_RATE: 1.0
N_PR_BINS_SURFACE: 30
N_SIGNATURE_PLOTS: null
