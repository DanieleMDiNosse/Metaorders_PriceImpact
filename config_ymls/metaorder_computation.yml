# metaorder_computation.py configuration

# Plotting
TICK_FONT_SIZE: 12
LABEL_FONT_SIZE: 14
TITLE_FONT_SIZE: 15
LEGEND_FONT_SIZE: 12
DEFAULT_FIGSIZE: [9, 5.5]

# Dataset / preprocessing
LEVEL: member  # "member" or "client"
PROPRIETARY: false
RECOMPUTE: false
TRADING_HOURS: ["09:30:00", "17:30:00"]

# Dataset selection (choose subfolder under data/out_files/images)
DATASET_NAME: ftsemib  # e.g., "ftsemib" or "mot"
DATA_ROOT: data
OUT_ROOT: out_files
IMG_ROOT: images

Q_V_DENOMINATOR_MODE: avg_5d  # same_day | prev_day | avg_5d
DAILY_VOL_MODE: avg_5d        # same_day | prev_day | avg_5d

PATH_DATA_FOLDER: null        # optional override; defaults to ${DATA_ROOT}/${DATASET_NAME}
PATH_NEW_DATA_FOLDER: null    # optional override
OUT_DIR: null                 # optional override; defaults to ${OUT_ROOT}/${DATASET_NAME}
IMG_DIR: null                 # optional override; defaults to ${IMG_ROOT}/${DATASET_NAME}/${LEVEL}_${PROPRIETARY_TAG}

# Section toggles
RUN_INTRO: false
RUN_METAORDER_COMPUTATION: false
RUN_SIGNATURE_PLOTS: false
RUN_SQL_FITS: false
RUN_WLS: true
RUN_IMPACT_PATH_PLOT: false

# Metaorder construction / fits
IMPACT_HORIZONS_MIN: [1, 3, 10, 30, 60]
SECONDS_FILTER: 120
MIN_QV: 1.0e-5
COMPUTE_IMPACT_PATHS: false
AFTERMATH_DURATION_MULTIPLIER: 2.0
AFTERMATH_NUM_SAMPLES: 30
MAX_GAP: 1h
MIN_TRADES: 5
RESAMPLE_FREQ: 1000s
N_LOGBIN: 30
MIN_COUNT: 20
MIN_COUNT_SURFACE: 10
MAX_PARTICIPATION_RATE: 1.0
N_PR_BINS_SURFACE: 30
N_SIGNATURE_PLOTS: null
