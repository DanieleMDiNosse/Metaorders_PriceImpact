# generate_paper_figures.py configuration

# Paper source and output paths
PAPER_TEX_PATH: paper/main.tex
IMG_OUTPUT_ROOT: paper/images
DATASET_NAME: ftsemib

# Default figure selection used when neither --targets nor --figures is passed.
DEFAULT_TARGETS: [all]

# Global font-size overrides propagated by scripts/generate_paper_figures.py.
# Set any entry to null to keep the downstream script's own default.
TICK_FONT_SIZE: 16
LABEL_FONT_SIZE: 18
TITLE_FONT_SIZE: 19
LEGEND_FONT_SIZE: 16
ANNOTATION_FONT_SIZE: 14
