# -----------------------------------------------------------------------------
# Figure overrides, grouped in paper order
# -----------------------------------------------------------------------------

figures:
  # Figure 1a: active members per ISIN (paper label fig:members_isins).
  members_per_isin:
    <<: *member_stat_subfigure_panel

  # Figure 1b: ISIN coverage per member (paper label fig:trades_per_member).
  member_isin_coverage_per_member:
    <<: *member_stat_subfigure_panel

  # Figure 2a: proprietary/client trades per ISIN (paper label fig:members_isins).
  proprietary_vs_client_trades_per_isin:
    <<: *member_stat_subfigure_panel

  # Figure 2b: mean daily metaorder-volume share (paper label fig:mean_perc_metavol_dailyvol).
  mean_daily_metaorder_volume_share:
    <<: *member_stat_subfigure_panel

  # Figure 3: member metaorder profiles (paper label fig:metaorders_per_member).
  member_metaorder_profiles_all_metaorders:
    <<: *descriptive_1x2_panel

  # Figure 4: metaorder metric distributions (paper label fig:metaorders_distributions).
  metaorder_distributions_prop_vs_client:
    <<: *distribution_grid_panel

  # Dormant/legacy schedule output; retained for generators that emit the non-median stem.
  execution_schedule_heatmap_prop_vs_client:
    <<: *execution_schedule_panel

  # Figure 5: execution schedule heatmap with medians (paper label fig:execution_schedule_characterization).
  execution_schedule_heatmap_prop_vs_client_median:
