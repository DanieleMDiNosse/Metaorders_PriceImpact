# Per-figure styling/layout overrides for generated figures used in paper/main.tex.
#
# Keys under `figures` are output filename stems without extension. You can also
# use full paper paths without extension when a generator is wired to look them up.
# These overrides are applied in the generating scripts, not via LaTeX resizing.
#
# Common keys currently supported by moimpact.paper_figure_styles:
#   width, height              Plotly canvas/export size in px
#   tick_font_size             Axis tick font size
#   label_font_size            Axis label/title font size
#   title_font_size            Figure title font size
#   legend_font_size           Legend font size
#   annotation_font_size       Annotation/subplot label font size
#   line_width                 Main trace line width
#   reference_line_width       Reference-line width
#   showlegend                 true/false
#   buy_color, sell_color      Optional trace colors for buy/sell panels
#   mean_color, line_color     Optional plot-specific line colors
#   band_alpha                 Optional SEM/confidence-band opacity in [0, 1]
#   margin: {l, r, t, b, pad}  Plotly layout margin in px

# Individual normalized-impact-path panels used in the paper 2x2 composites.
impact_path_2x2_panel: &impact_path_2x2_panel
  width: 1200
  height: 1000
  tick_font_size: 60
  label_font_size: 66
  annotation_font_size: 60
  showlegend: false
  line_width: 5
  reference_line_width: 3
  margin:
    l: 130
    r: 40
    t: 35
    b: 115

# For generated 1x2 plot matrices: reference impact-path font sizes minus 5.
one_by_two_panel_fig9_minus5: &one_by_two_panel_fig9_minus5
  tick_font_size: 45
  label_font_size: 50
  title_font_size: 61
  legend_font_size: 55
  annotation_font_size: 55
  line_width: 5
  reference_line_width: 3
  margin:
    l: 120
    r: 50
    t: 55
    b: 115

# Single impact-fit panels stacked as a 2x1 paper figure.
participation_fit_panel: &participation_fit_panel
  width: 1200
  height: 1000
  tick_font_size: 34
  label_font_size: 38
  title_font_size: 38
  legend_font_size: 32
  line_width: 4
  margin:
    l: 95
    r: 35
    t: 45
    b: 95

execution_schedule_panel: &execution_schedule_panel
  tick_font_size: 32
  label_font_size: 36
  title_font_size: 36
  annotation_font_size: 34
  line_width: 5
  reference_line_width: 3
  margin:
    l: 95
    r: 110
    t: 50
    b: 85

rolling_timeseries_panel: &rolling_timeseries_panel
  width: 1200
  height: 520
  tick_font_size: 38
  label_font_size: 42
  title_font_size: 42
  legend_font_size: 36
  line_width: 4
  reference_line_width: 2
  margin:
    l: 105
    r: 35
    t: 35
    b: 85

crowding_impact_2x2_panel: &crowding_impact_2x2_panel
  width: 1200
  height: 1000
  tick_font_size: 55
  label_font_size: 61
  title_font_size: 61
  legend_font_size: 55
  annotation_font_size: 55
  line_width: 5
  margin:
    l: 120
    r: 50
    t: 70
    b: 115

member_comovement_panel: &member_comovement_panel
