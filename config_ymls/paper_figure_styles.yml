  # Figure 7: logarithmic proprietary vs client impact overlay (paper label fig:impact_vs_size_log).
  logarithmic_prop_vs_nonprop:
    <<: *impact_fit_single_panel

  # Figure 8a-b: participation-rate-conditioned impact fits; used once for client and once for proprietary.
  power_law_fits_by_participation_rate:
