# Per-figure styling/layout overrides for generated figures used in paper/main.tex.
#
# Keys under `figures` are output filename stems without extension. You can also
# use full paper paths without extension when a generator is wired to look them up.
# These overrides are applied in the generating scripts, not via LaTeX resizing.
#
# Common keys currently supported by moimpact.paper_figure_styles:
#   width, height              Plotly canvas/export size in px
#   tick_font_size             Axis tick font size
#   label_font_size            Axis label/title font size
#   title_font_size            Figure title font size
#   legend_font_size           Legend font size
#   annotation_font_size       Annotation/subplot label font size
#   line_width                 Main trace line width
#   reference_line_width       Reference-line width
#   showlegend                 true/false
#   buy_color, sell_color      Optional trace colors for buy/sell panels
#   mean_color, line_color     Optional plot-specific line colors
#   band_alpha                 Optional SEM/confidence-band opacity in [0, 1]
#   margin: {l, r, t, b, pad}  Plotly layout margin in px
#
# Organization rule: entries are grouped by manuscript section/paper order, not
# by fragile LaTeX figure number. Reuse a layout preset unless a figure genuinely
# needs its own margins or typography.

# -----------------------------------------------------------------------------
# Layout presets
# -----------------------------------------------------------------------------

# Figures 1 and 2 (member-statistics panels in Section Data and Metaorder Reconstruction).
# Single panels placed as subfigures near 0.70\linewidth: keep fonts large
# enough after LaTeX scaling but leave room for long categorical x labels.
member_stat_subfigure_panel: &member_stat_subfigure_panel
  width: 1200
  height: 850
  tick_font_size: 30
  label_font_size: 34
  title_font_size: 36
  legend_font_size: 28
  annotation_font_size: 30
  line_width: 3.5
  reference_line_width: 2
  margin:
    l: 105
    r: 45
    t: 70
    b: 120

