  height: 720
  tick_font_size: 24
  label_font_size: 28
  title_font_size: 30
  legend_font_size: 24
  annotation_font_size: 24
  line_width: 3.5
  reference_line_width: 2
  margin:
    l: 90
    r: 250
    t: 115
    b: 85

figures:
